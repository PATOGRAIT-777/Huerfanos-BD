<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gestión de Personal — Inicio</title>
  <link rel="stylesheet" href="../css/universalCss.css" type="text/css">
  <link rel="stylesheet" href="../css/divs.css" type="text/css">
  <link rel="stylesheet" href="../css/pInicio.css" type="text/css">
</head>

    <div id="login-modal" class="login-modal" onclick="closeOnOutsideClick(event)">
      <div class="login-content">
  <span class="close" onclick="closeLogin()">&times;</span>
  <img src="https://cdn.animeav1.com/backdrops/2067.jpg" alt="Banner Login" class="login-banner">
  
  <form class="login-form" action="#login">
    <h2>Ingresar</h2>
    
    <div id="login-message" style="margin-bottom: 15px; font-weight: bold; display:none;"></div>

    <input type="text" name="email" placeholder="Correo Electrónico" required>
    <input type="password" name="password" placeholder="Contraseña" required>
    
    <button type="submit" class="btn-primary">Entrar</button>
  </form>
</div>
    </div>

    <script> 
        function openLogin() {
          document.getElementById('login-modal').style.display = 'flex';
        }

        function closeLogin() {
          document.getElementById('login-modal').style.display = 'none';
        }

function closeOnOutsideClick(event) {
  const modal = document.getElementById('login-modal');
  const box = modal.querySelector('.login-content');

  if (box && !box.contains(event.target)) {
    closeLogin();
  }
}

    </script>
    
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="initPag.html">Gestión de Personal</a>
      <nav class="main-nav" aria-label="Navegación principal">
        <a class="active" href="initPag.html">Inicio</a>
      </nav>
      <div class="header-actions">
        <button class="btn-primary" onclick="openLogin()">Acceder</button>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h2>Bienvenido al sistema de gestión de personal</h2>
      <p>Inicia sesión o regístrate para comenzar a trabajar con el equipo.</p>
    </div>
  </section>

  <!-- Sección simplificada; el contenido anterior no es relevante -->

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> TechSide</p>
      <small class="muted">Términos y condiciones · Política de privacidad</small>
    </div>
  </footer>

  <script>
    // Mantén solo la lógica visual aquí
    function openLogin() { 
        document.getElementById('login-modal').style.display = 'flex'; 
        const msg = document.getElementById('login-message');
        if(msg) msg.textContent = '';
    }
    function closeLogin() { document.getElementById('login-modal').style.display = 'none'; }
    const yearSpan = document.getElementById('year');
    if(yearSpan) yearSpan.textContent = new Date().getFullYear();
  </script>
  
  <script src="../js/session.js"></script>
  <script src="../js/authLogic.js"></script>
</body>
</html>
