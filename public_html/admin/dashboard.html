<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Dashboard</title>
  <link rel="stylesheet" href="../css/universalCss.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/divs.css">
  <style>
    .admin-cards{display:flex;gap:16px;flex-wrap:wrap}
    .card-metric{flex:1 1 200px;padding:18px;background:#1f2937;color:#fff;border-radius:8px}
    table{width:100%;border-collapse:collapse}
    table th,table td{padding:8px;border:1px solid rgba(0,0,0,0.08);background:transparent;color:inherit}
    .main{padding:20px}
  </style>
  </head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="initPag.html">Gestión de Personal</a>
      <nav class="main-nav">
        <a href="initPag.html">Inicio</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="formAgregar.html">Registrar personal</a>
      </nav>
      <div class="header-actions">
        <span id="user-name-display" style="margin-right:12px;"></span>
        <button class="btn-ghost" onclick="cerrarSesion()">Salir</button>
      </div>
    </div>
  </header>

  <div class="container layout" style="display:flex;gap:20px;align-items:flex-start">
    <aside class="sidebar" style="min-width:220px;max-width:260px">
      <nav class="sidebar-list">
        <a href="dashboard.html">Dashboard</a>
        <a href="formAgregar.html">Nuevo personal</a>
      </nav>
    </aside>

    <main class="main" style="flex:1">
      <h1>Listado de Personal</h1>
      <p class="muted">Aquí puedes supervisar, consultar y administrar al equipo.</p>

      <!-- filtros -->
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
        <label>Tipo:
          <select id="filter-tipo">
            <option value="">Todos</option>
            <option value="Empleado">Empleado</option>
            <option value="Voluntario">Voluntario</option>
          </select>
        </label>
        <label>Rol:
          <select id="filter-rol">
            <option value="">Todos</option>
            <option>Director</option>
            <option>Coordinador</option>
            <option>Psicólogo</option>
            <option>Doctor</option>
            <option>Abogado</option>
            <option>Trabajador Social</option>
            <option>Analista</option>
          </select>
        </label>
        <button id="btn-new-personal" class="btn-primary">+ Nuevo personal</button>
      </div>

      <table id="personal-table">
        <thead>
          <tr>
            <th>Nombre completo</th>
            <th>Rol</th>
            <th>Tipo</th>
            <th>Estatus</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <!-- Registros se insertarán aquí -->
        </tbody>
      </table>
    </main>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> TechSide</p>
      <small class="muted">Términos y condiciones · Política de privacidad</small>
    </div>
  </footer>

  <script src="../js/session.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
