<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fundación - Personal</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <div class="container">
        <h1>Sistema de Gestión de Personal</h1>
        
        <a href="../registro.html" class="btn">➕ Registrar Nuevo Personal</a>
        
        <h2>Listado de Personal</h2>
        
        <table id="tabla-usuarios">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Rol</th>
                    <th>Tipo</th>
                    <th>Correo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="lista-usuarios">
                <tr>
                    <td colspan="6" style="text-align: center;">Cargando...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // Cuando cargue la página, pedir los usuarios
        fetch('../api/usuarios')
            .then(response => response.json())
            .then(usuarios => {
                const tbody = document.getElementById('lista-usuarios');
                
                if (usuarios.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">No hay usuarios registrados</td></tr>';
                    return;
                }
                
                let html = '';
usuarios.forEach(u => {
    html += `<tr>
        <td>${u.id}</td>
        <td>${u.nombre_completo}</td>
        <td>${u.rol}</td>
        <td>${u.tipo}</td>
        <td>${u.correo}</td>
        <td>${u.activo ? '✅ Activo' : '❌ Inactivo'}</td>
        <td>
            <a href="/ver-usuario.html?id=${u.id}" style="color: #3498db; text-decoration: none;">👁️ Ver</a>
        </td>
    </tr>`;
});
                tbody.innerHTML = html;
            })
            .catch(error => {
                document.getElementById('lista-usuarios').innerHTML = 
                    '<tr><td colspan="6" style="color: red;">Error al cargar</td></tr>';
            });
    </script>
</body>
</html>
